name: Deploy Firebase

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'firebase-admin/**'
      - '.github/workflows/deploy-firebase.yml'

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set environment variables
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Write Firebase dev service account
        working-directory: firebase-admin
        env:
          FIREBASE_SERVICE_ACCOUNT_DEV: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_DEV" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_DEV secret" >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_DEV" > retro-collections-dev.json

      - name: Install Firebase dependencies
        working-directory: firebase-admin
        run: npm ci

      - name: Test Firestore rules (emulator)
        working-directory: firebase-admin
        env:
          ENV: dev
        run: |
          npm run test:rules:emulator:misc
          npm run test:rules:emulator:collections

      - name: Deploy Firebase
        working-directory: firebase-admin
        run: npm run deploy:ci -- --token ${{ secrets.FIREBASE_TOKEN }}
